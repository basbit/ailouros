name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v1.0.0). Required for workflow_dispatch."
        required: true

permissions:
  contents: write

jobs:
  publish-desktop-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build desktop artifact
        run: bash scripts/build_desktop_artifact.sh "${{ steps.version.outputs.tag }}"

      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          files: |
            dist/ailouros-backend-${{ steps.version.outputs.tag }}.tar.gz
            dist/ailouros-backend-${{ steps.version.outputs.tag }}.tar.gz.sha256
          generate_release_notes: true

      - name: Upload artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ailouros-backend-${{ steps.version.outputs.tag }}
          path: |
            dist/ailouros-backend-${{ steps.version.outputs.tag }}.tar.gz
            dist/ailouros-backend-${{ steps.version.outputs.tag }}.tar.gz.sha256
