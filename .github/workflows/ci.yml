name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref — saves CI minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Python lint (flake8 + import-linter + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Backend CI does not need the frontend submodule — we skip it both to
        # cut clone time and to decouple parent CI from the submodule pointer
        # drift that used to break main.
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: flake8
        run: python -m flake8 .

      - name: import-linter
        run: python -m importlinter.cli lint

      - name: mypy (baseline ≤ SWARM_MYPY_MAX)
        env:
          SWARM_MYPY_MAX: "20"
        run: |
          set -eo pipefail
          count=$(python -m mypy backend/ --ignore-missing-imports --no-error-summary 2>&1 | grep -c "^backend/" || true)
          echo "mypy: $count errors (threshold: $SWARM_MYPY_MAX)"
          if [ "$count" -gt "$SWARM_MYPY_MAX" ]; then
            python -m mypy backend/ --ignore-missing-imports --no-error-summary 2>&1 | tail -20
            exit 1
          fi

  test:
    name: Python tests (pytest, excludes smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: pytest
        run: python -m pytest --maxfail=1 --disable-warnings -q --ignore=tests/smoke
