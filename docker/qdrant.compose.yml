services:
  qdrant_test:
    image: qdrant/qdrant:v1.12.4
    container_name: swarm_qdrant_test
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/readyz"]
      interval: 2s
      timeout: 2s
      retries: 30
